name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Provide placeholder env vars so the build doesn't trip on missing secrets.
          # These are NOT used at runtime in CI — only to satisfy schema validation.
          GOOGLE_SHEETS_CREDENTIALS: PLACEHOLDER
          GOOGLE_SHEETS_TOURS_ID: PLACEHOLDER
          NEXT_PUBLIC_WHATSAPP_NUMBER: "5491100000000"
          NEXT_PUBLIC_SITE_URL: https://example.com
          RESEND_API_KEY: PLACEHOLDER
          INQUIRY_NOTIFICATION_EMAIL: ci@example.com
          REVALIDATE_SECRET: ci-only
