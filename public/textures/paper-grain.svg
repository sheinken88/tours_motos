<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!--
    Paper-grain placeholder. Procedural fiber/grain via feTurbulence.
    Tileable at 256×256. Applied at 10% opacity over the paper field.
    Replace with hand-authored kraft scan in Phase 10.
  -->
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.12
                             0 0 0 0 0.08
                             0 0 0 0 0.05
                             0 0 0 0.10 0" />
    </filter>
  </defs>
  <rect width="256" height="256" filter="url(#grain)" />
</svg>
