<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <!--
    Red-grunge placeholder. Coarser noise + scratches to simulate aged ink wear.
    Tileable at 320×320. Applied at 12% opacity over the brand-red field.
    Replace with hand-authored screen-print scan in Phase 10.
  -->
  <defs>
    <filter id="grunge" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" seed="7" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.05
                             0 0 0 0 0.02
                             0 0 0 0 0.02
                             0 0 0 0.18 0" />
    </filter>
    <filter id="scratches" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.02 0.2" numOctaves="2" seed="11" stitchTiles="stitch" />
      <feColorMatrix values="0 0 0 0 0.02
                             0 0 0 0 0.01
                             0 0 0 0 0.01
                             0 0 0 0.10 0" />
    </filter>
  </defs>
  <rect width="320" height="320" filter="url(#grunge)" />
  <rect width="320" height="320" filter="url(#scratches)" />
</svg>
